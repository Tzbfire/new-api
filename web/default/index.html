<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>New API</title>
    <meta name="title" content="New API" />
    <meta
      name="description"
      content="Unified AI API gateway and admin dashboard."
    />

    <meta name="theme-color" content="#fff" />

    <script>
      (function () {
        function showBootError(message) {
          try {
            var root = document.getElementById('root') || document.body
            var box = document.createElement('pre')
            box.style.cssText =
              'margin:16px;padding:12px;white-space:pre-wrap;border:1px solid #fca5a5;background:#fef2f2;color:#991b1b;border-radius:8px;font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace;'
            box.textContent =
              '前端启动失败，请截图反馈：\n' +
              String(message || 'unknown error')
            root.appendChild(box)
          } catch (_) {}
        }

        window.addEventListener('error', function (event) {
          showBootError(
            (event && (event.message || event.filename)) || 'script error',
          )
        })
        window.addEventListener('unhandledrejection', function (event) {
          showBootError(
            (event && event.reason && (event.reason.stack || event.reason.message)) ||
              (event && event.reason) ||
              'unhandled rejection',
          )
        })
      })()
    </script>
    <!--umami-->
    <!--Google Analytics-->
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
