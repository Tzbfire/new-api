# Air hot-reload config for local new-api development.
# Install: go install github.com/air-verse/air@latest
# Run:     air
# Or:      air -c .air.toml

root = "."
tmp_dir = "tmp"

[build]
  # Rebuild when Go sources change. Keep flags light for fast iteration.
  cmd = "go build -o ./tmp/main ."
  bin = "./tmp/main"
  # Default port matches flag -port and docker-compose.dev.yml
  full_bin = "APP_ENV=development ./tmp/main --port 3000"
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "toml", "json"]
  exclude_dir = [
    "tmp",
    "tmp_build",
    "vendor",
    "testdata",
    "docs",
    "data",
    "logs",
    "upload",
    "web",
    "electron",
    "node_modules",
    ".git",
    ".idea",
    ".vscode",
    ".gomodcache",
    ".gocache",
    ".gopath",
    ".cache",
    "plans",
  ]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  delay = 800
  stop_on_error = true
  send_interrupt = true
  kill_delay = "2s"
  rerun = false
  rerun_delay = 500

[log]
  time = true
  main_only = false
  silent = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
